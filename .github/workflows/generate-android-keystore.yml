name: Generate Android Keystore Secret

on:
  workflow_dispatch:
    inputs:
      key_alias:
        description: "Android signing key alias"
        required: true
        default: "vidsaver"

permissions:
  contents: read

jobs:
  generate:
    name: Generate keystore
    runs-on: ubuntu-latest

    steps:
      - name: Generate Android keystore
        shell: bash
        run: |
          set -euo pipefail

          STORE_PASSWORD="$(openssl rand -base64 32)"
          KEY_PASSWORD="$(openssl rand -base64 32)"
          KEY_ALIAS="${{ github.event.inputs.key_alias }}"

          echo "::add-mask::${STORE_PASSWORD}"
          echo "::add-mask::${KEY_PASSWORD}"

          keytool -genkeypair \
            -v \
            -keystore upload-keystore.jks \
            -storetype JKS \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -alias "${KEY_ALIAS}" \
            -storepass "${STORE_PASSWORD}" \
            -keypass "${KEY_PASSWORD}" \
            -dname "CN=Vidsaver, OU=Release, O=NextInPK, L=Unknown, ST=Unknown, C=US"

          {
            echo "ANDROID_KEYSTORE_BASE64=$(base64 -w 0 upload-keystore.jks)"
            echo "ANDROID_KEYSTORE_PASSWORD=${STORE_PASSWORD}"
            echo "ANDROID_KEY_PASSWORD=${KEY_PASSWORD}"
            echo "ANDROID_KEY_ALIAS=${KEY_ALIAS}"
          } > android-keystore-github-secrets.txt

      - name: Upload keystore secret values
        uses: actions/upload-artifact@v4
        with:
          name: android-keystore-github-secrets
          path: android-keystore-github-secrets.txt
          if-no-files-found: error
          retention-days: 1
