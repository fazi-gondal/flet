name: flet_media_scanner
description: Flet extension for Android media scanner using native MediaScannerConnection.
version: 0.85.3
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  flet: ^0.85.0

flutter:
  plugin:
    platforms:
      android:
        package: com.example.flet_media_scanner
        pluginClass: FletMediaScannerPlugin
